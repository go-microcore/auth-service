info:
  contact: {}
  title: auth-service
  version: "1.0"
paths:
  /auth/devices:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.DeviceResponse'
            type: array
        "401":
          description: 'Possible codes: INVALID_TOKEN, 2FA_REQUIRED'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "403":
          description: 'Possible codes: INSUFFICIENT_PERMISSIONS'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Returns a list of user's active devices.
      tags:
      - Devices
  /auth/logout/:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: 'Possible codes: INVALID_TOKEN, 2FA_REQUIRED'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "403":
          description: 'Possible codes: INSUFFICIENT_PERMISSIONS'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Terminate the current session on user device.
      tags:
      - Logout
  /auth/logout/all:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
