          schema:
            $ref: '#/definitions/http.AuthResponse'
        "400":
          description: 'Possible codes: INVALID_AUTH_REQUEST'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
