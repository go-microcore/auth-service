            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Terminate all active sessions for a user across all devices.
      tags:
      - Logout
  /auth/logout/device:
    post:
      consumes:
