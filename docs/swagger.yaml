      - BearerAuth: []
      summary: Returns HTTP rules matching the filter criteria.
      tags:
      - Rules (HTTP)
  /auth/tokens/:
    post:
      consumes:
      - application/octet-stream
      parameters:
      - description: 'BINARY DATA REQUIRED: Encrypt this JSON structure using AES-256-GCM
          with AUTH_KEY before sending'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.AuthRequest'
      produces:
      - application/octet-stream
      - application/json
      responses:
        "200":
          description: Returns encrypted binary. Decrypt using AES-256-GCM with AUTH_KEY
