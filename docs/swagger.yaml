      responses:
        "204":
          description: No Content
        "400":
          description: 'Possible codes: INVALID_DEVICE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "401":
          description: 'Possible codes: INVALID_TOKEN, 2FA_REQUIRED'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "403":
          description: 'Possible codes: INSUFFICIENT_PERMISSIONS'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "415":
          description: 'Possible codes: INVALID_JSON_BODY'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Terminate the session on a selected user device.
      tags:
      - Logout
  /auth/roles/:
