        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.Auth2FARequest'
      produces:
      - application/octet-stream
      - application/json
      responses:
        "200":
          description: Returns encrypted binary. Decrypt using AES-256-GCM with AUTH_KEY
