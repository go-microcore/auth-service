          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Deletes a role by ID.
      tags:
      - Roles
    patch:
      consumes:
      - application/json
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      - description: Request data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http._UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: 'Possible codes: INVALID_ROLE_ID, INVALID_ROLE_NAME, INVALID_ROLE_DESCRIPTION'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "401":
          description: 'Possible codes: INVALID_TOKEN, 2FA_REQUIRED'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "403":
          description: 'Possible codes: INSUFFICIENT_PERMISSIONS'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "404":
          description: 'Possible codes: ROLE_NOT_FOUND'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "415":
          description: 'Possible codes: INVALID_JSON_BODY'
          schema:
            $ref: '#/definitions/server.ErrResponse'
        "503":
          description: 'Possible codes: SERVICE_UNAVAILABLE'
          schema:
            $ref: '#/definitions/server.ErrResponse'
      security:
      - BearerAuth: []
      summary: Updates role data by ID.
      tags:
      - Roles
  /auth/roles/filter:
    post:
      consumes:
      - application/json
      parameters:
      - description: Request data
        in: body
        name: request
        required: true
        schema:
