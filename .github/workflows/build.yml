name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write 
  attestations: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Linter via Task
        run: task lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run Tests
        run: task test

  build:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: arm64 }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Binary via Task
        run: |
          BUILD_OS=${{ matrix.os }} \
          BUILD_ARCH=${{ matrix.arch }} \
          VERSION=${{ github.ref_name }} \
          COMMIT=${{ github.sha }} \
          task build

      - name: Attest Binary
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'bin/auth-service_${{ matrix.os }}_${{ matrix.arch }}'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os  }}-${{ matrix.arch }}
          path: bin/auth-service_${{ matrix.os }}_${{ matrix.arch }}
  docker:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          pattern: binary-linux-*
          merge-multiple: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            microcorelab/auth-service:latest
            microcorelab/auth-service:${{ github.ref_name }}
          provenance: true 

      - name: Attest Docker Image
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: index.docker.io/microcorelab/auth-service
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: bin/*
          prerelease: ${{ contains(github.ref, 'rc') }}
          generate_release_notes: true
